name: hacksns

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    volumes:
      - db_data:/app/server/data
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    volumes:
      - db_data:/app/server/data
    depends_on:
      db:
        condition: service_completed_successfully
    environment:
      SESSION_SECRET: hackSNS-dev-secret-change-in-production

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - db_data:/app/server/data
    depends_on:
      db:
        condition: service_completed_successfully
    environment:
      SESSION_SECRET: hackSNS-dev-secret-change-in-production

volumes:
  db_data:
